{{define "metrics-list"}}
{{if .Categories}}
{{range .Categories}}
<div class="metrics-cat-section">
  <div class="metrics-cat-label"><span class="metrics-cat-dot" style="background:{{.Color}}"></span>{{.Label}}</div>
  <div class="metrics-grid">
    {{range .Metrics}}
    <a href="/metrics/{{.Name}}" class="metrics-card" style="text-decoration:none;color:inherit">
      <div class="metrics-card-name">{{.DisplayName}}</div>
      <div class="metrics-card-bottom">
        {{if .Value}}<span class="metrics-card-value">{{.Value}}</span><span class="metrics-card-unit">{{.Unit}}</span>
        {{else}}<span class="metrics-card-empty">—</span>{{end}}
      </div>
    </a>
    {{end}}
  </div>
</div>
{{end}}
{{else}}
<div class="metrics-empty">{{T .Lang "no_metrics_found"}}</div>
{{end}}
{{end}}
