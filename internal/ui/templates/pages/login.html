{{define "login"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f4f0;color:#1a1714;display:flex;align-items:center;justify-content:center;height:100vh}
.box{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:36px 32px;width:100%;max-width:340px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
h1{font-size:18px;font-weight:700;margin-bottom:24px;text-align:center;color:#1a1714}
label{font-size:12px;color:#6b6560;display:block;margin-bottom:6px}
input{width:100%;background:#f5f4f0;border:1px solid #e8e5e0;color:#1a1714;padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#2563eb}
button{margin-top:16px;width:100%;background:#2563eb;border:none;color:#fff;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#1d4ed8}
.err{color:#dc2626;margin-bottom:12px;font-size:13px}
</style>
</head>
<body>
<div class="box">
  <h1>&#10084; Health</h1>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" autofocus>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
{{end}}
