{{define "setup"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Health — Setup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f4f0;color:#1a1714;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
h1{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center;color:#1a1714}
.subtitle{font-size:13px;color:#6b6560;text-align:center;margin-bottom:24px}
label{font-size:12px;color:#6b6560;display:block;margin-bottom:6px;margin-top:14px}
input{width:100%;background:#f5f4f0;border:1px solid #e8e5e0;color:#1a1714;padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
input:focus{border-color:#2563eb}
button{margin-top:20px;width:100%;background:#2563eb;border:none;color:#fff;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#1d4ed8}
.err{color:#dc2626;margin-bottom:12px;font-size:13px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px}
</style>
</head>
<body>
<div class="box">
  <h1>&#10084; Health Dashboard</h1>
  <p class="subtitle">Create your admin account to get started.</p>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Email <span style="font-weight:400;color:#9b9591">(optional — used for Authentik SSO)</span></label>
    <input type="email" name="email" autocomplete="email">
    <label>Password</label>
    <input type="password" name="password" autocomplete="new-password">
    <label>Confirm Password</label>
    <input type="password" name="confirm" autocomplete="new-password">
    <button type="submit">Create Account</button>
  </form>
</div>
</body>
</html>
{{end}}
